front:
  text: 華蓋山三仙真經太華蓋山三仙祖師記文謹按巴陵令霍童崔世召纂輯華山藝文志恭録
  hash: sha256:d896d0ee05562772ce9ef3e4e6ac890808d422e365854489876ebde6bdf29fb7
  markers:
  - {type: page-break, offset: 7, content: '', id: CK-KZ_KR5i0102_01p001a}
body:
  text: 橋仙觀碑記唐顏真卿撰粵以江南之地佳麗垂名山嶽之間宛有仙洞余祇膺聖澤廉察臨川一日按地理圖得屬邑崇仁縣華蓋山有王郭二真君壇存焉欣覩異事未原其始他日公餘因令軍將往山訪求碑銘果得一石記乃隋開皇五年焚修道士李子真於壞碑上再録出其文則知王郭二真者仙不顯名王則方平之再從郭乃王之族弟也始於金華山修道以圖輕舉尋遊洞府自玉笥山將之麻姑洞中道悅一山問故老曰此為何山對曰巴陵華蓋山也二真君相與言曰此山福地名亦異焉因求卜止再鍊神丹山下父老請而再拜曰敢問真人之名字曰吾等修致於虛無不欲述焉後有一道士來謁敢問真人之師曰吾師浮邱先生則上界大仙也頃於金華山遇焉二真君能走石飛符興雲致雨或有人疾苦暴亡往而告之即飛符以救之嵗將大旱即致霖雨以濟之至晉惠帝元康二年二月一日綵雲連晝仙樂喧風二真乃驂鸞駕鶴冉冉上升今上升之壇及浮邱先生之壇存焉其後立觀焚修境邑將旱若詣壇禱之則雲雨立應美乎故事昭然仙蹤儼若雖遺史籍安泯聲華鸞鶴對飛共作壺中之客林巒疉秀別含象外之春因與府官議崇觀宇永例焚修尋差官將以公用錢詣山換殿宇門廊不日而回云工畢矣余德慚好道任忝分符原始要終罕測沖天之日飛文染翰用貽終古之芳銘曰元牝之門澄心養神學則彼衆得者幾人冉冉千古堂堂二真丹成巖谷道應穹旻綵雲色煥仙樂聲勻遲日初麗桃花正新驂鸞拔俗駕鶴超雲言歸紫府笑別芳辰山存華蓋長含異春恩流豐澤用濟蒸民浮雲世速好月生輝儼若聖址永播清芬金紫光祿大夫行撫州刺史上柱國魯郡開國公顏真卿撰并書唐大曆四年己酉正月二十五日立石三真君記宋李沖元撰臨川山秀水靈頗多前代神仙遺跡丹井仙壇往往雜出於圖記文字間可以考信而崇仁華蓋山王郭二真君祠靈跡尤著唐顏魯公取隋開皇五年舊碑所載事為記弗詳示名姓及州里世系蓋神仙家素不欲顯述故如此惟二真君曰從事浮邱公得旨偕入金華後居此山能飛符走石興雲致雨使死者生病者愈以晉元康二年上升當時人問真君名姓者祕而不言後州縣嵗時水旱禱之立應而郡人男女疾疫祈禳無不之焉至走旁郡數千里外皆恭敬齊潔然後登山不爾風雷雨雹虎豹蛇虺蜂蠆之立至祠中祀浮邱公像山上有浮邱公壇熙寧中州以王郭異事上之朝廷神宗皇帝詔封王為沖應真君郭為誠應真君而偶遺浮邱公事故旌號不及元符二年仲夏洪州不雨民有憂色右正言王公桓以漕使權領州事聞三真顯應如此乃疏食齊居遣崇邑主簿葉祖文詣祠請迎真像至撫城率僚屬迓於城門外館於天慶觀中陰雲隨至焚香請禱雨即大霔三日始霽稼穡勃興郡人歡呼嘆未曾有莫不德公之賜公以浮邱為二真之師而褒禮未加甚非所以嚴奉高真之意乃符臨川主者具浮邱始末將請命朝廷而屬門吏李沖元考核其事而記之沖元謹按劉向列仙傳稱王子晉遇浮邱公接以上嵩山而漢書言浮邱伯吕后時猶在長安與楚元王友善因授詩學於申公蓋齊人也唐林寶元和姓纂亦載浮邱伯云子晉師之而子晉乃周太子然則浮邱公蓋出於子晉之先實莫究其來之遠近也嗚呼神仙之學古未有也然軒轅採銅鑄鼎而騎龍上天女媧鍊石補天而不改舊物則導引之書有不可得而泯滅也自秦皇漢武好方士長生久視之妙世始知有神仙劉向因之為列仙傳獨載王子晉師浮邱公而浮邱公反無傳焉然則當向時已莫得而考矣王郭於晉元康時遇浮邱則疑常在人間豈有意接引於後來耶夫神仙之學大抵宗本黃帝老子以清靜無為虛心寡欲為本而佐以陰功密行及煉丹服氣之術要之非超邁灑落者不能也方其混迹人間未有顯稱大抵以名為深戒逮其仙去始著異跡使人知所慕而已此其用意豈淺狹之量者所能倣佛而秦漢之君富有天下窮兵黷武心侈意盈神荒氣蠹乃欲長生不死果足以出造化越古今乎然近世為此學者反以沽名賈利僕僕公卿之間求獻其說且偃然居之不疑自謂已嘗經崑崙涉太虗游恍惚之庭矣聞其風者至或危坐敬聽不敢竊議曾不察其人真超然世表者乎厯觀前代諸仙皆卓絶不羣擺脫塵纍率有造微參寥之志雖未御風乘雲絶迹人間而已不與世俗並軌方駕矣推是心以往庶或近之王公高明厚德君子頗以鄙言為然故序浮邱公事而并記之瀛州防禦推官充江西路轉運司管句帳司李沖元撰并書通直郎充江西路轉運司管句文字事王資篆蓋左朝奉大夫知撫州軍兼管內勸農上柱國賜紫金魚袋狄明遠立石皇宋元年七月二十七日重刋道藏輯要太華蓋山三仙真君解寃滅罪度人心經持經懺要訣凡誦是經懺必要精誠先齊沐心身然後思真如對升壇以左足先登就位叩齒集神左手上香三柱禮拜五體投地唪誦宜音韻和平如法莊嚴天人交慶誦經懺總贊天地羅萬象斗極司斡旋人生覆載內心含萬化原君父恩高厚忠孝當所先循性各自盡塵寰即洞天持經懺十二真律消愆心地光明吉神呵護思想邪妄惡魔侵侮算減祿削憂患疾苦猛省自悔回頭是路立功人生於世暫來暫去富貴榮華春冰朝露幻身忽敝茫茫無措生無福田瞑目何據奉戒心為形役乃獸乃禽虧心虧心罪大滅身惡小勿積過知勿行貞明持戒忍辱自懲持齊耽嗜葷羶黶氣傷魂三宫穢積六腑垢溷研味至道嚼爾菜根識趣高曠廓然清神保命陰陽二氣形得以生戰退四凶乃絶死根健順五德性賦以成修身盡性始全天真潔身悲爾萬姓來自穢中貪嗔癡怨益以濁蒙名韁利鎖往來憧憧棄緣割愛脫離樊籠明心人心惟危如虎之猛降伏馵羈勿使妄逞道心惟微如種之萌栽培滋長道果自成淨意志學之士道念常貞嗜欲紛華相對無情初防意惡甚於守城嚴密武毅斬欲將萌養氣氣本浩然充塞兩儀行有不慊俯仰滋虞惟心無疚不憂不懼至剛至大遍覆太虗凝神神惟無妄妄則非神庸愚私邪自與鬼鄰聰明正直純乎天性死而不昧列於仙品開慧維兹方寸至虛至靈本無二物光潔圓瑩棲泊無思心常清淨暗室明鐙圓靈水鏡成道間邪存誠欲盡理全積功纍仁民樂物安萬善既備福德無邊三界保衛玉書臨軒大金光呪混沌浩蕩一氣初分金光正氣號曰玉清元始立像混然至尊青白交射始立上清七寶闕內玉宸道君三氣化結洞耀太清祥光瑞殿五靈老君中央一氣玉帝化生六波天王梵氣天君丹霞碧落雷祖九宸三景內外萬聖千真三十二天四維四靈五方五老日月列星輝光交耀分布乾坤清氣上騰濁質下凝妙用入海水帝溪真三才四象陰陽合形北酆九壘嶽瀆威靈內有霹𩆝雷神隱名諸天釋韻五帝監生十天太乙罡運乾坤中山青帝萬象森森靈君赫赫日月之精哼唎達哩元真合英赤帝隱韻元明子欽大有玉字雷電轟轟𠱀囉口癸囉永保長生啒律嚤訶密多嗗哪吽吽攝衛喗𠻗吱婆律厯賀唎唭噒哩他急急如玉皇光降律令敕開經懺讚度人心懺滅罪真經二十四等說人心善惡悉分明一十九等勸化矢冰清二境化身天尊三稱九拜太華蓋山三仙真君解寃滅罪度人心經淨心神咒太上台星應變無停驅邪縳魅保命護身智慧明淨心神安寧三魂永久魄無喪傾急急如律令淨口神咒丹朱口神吐穢除氛舌神正倫通命養神羅千齒神卻邪衛真喉神虎賁氣神引津心神丹元令我通真思神鍊液道氣長存淨身神咒靈寶天尊安慰身形弟子魂魄五臟元冥青龍白虎隊仗紛紜朱雀元武侍衛身形急急如律令安土地神咒元始安鎮普告萬靈嶽瀆真官土地祇靈左社右稷不得妄驚回向正道內外澄清各安方位備守壇庭太上有命搜捕邪精護法神王保衛誦經皈依大道元亨利貞啓雷神誥仰啓雷門諸司將符圖法録衆天君歘火都天鄧元帥雷霆猛殺辛天君飛捷報應張使者五方五氣五雷君龐劉苟畢神通大馬趙溫康顯威靈雷部田崔劉陶高五府陳馬朱蕭鄭北極三光楊元帥地司太歲殷將軍無私上將溫太保捉縳枷栲衆天君都天糾罰王靈官酆都內外衆祇靈功曹土地直符使神虎何喬五道神隊仗森森列左右旌旗閃閃耀乾坤劍㦸戈矛常在手鎗刀斧鉞盡隨身祈晴禱雨并䤋祟封壇破廟及伸寃天雷霹𩆝驚鬼膽雷火焰焰燒鬼營敢有不順吾道者押赴雷部滅真形掃蕩罡風迎帝旨護持道法濟生民焚香啓請望來臨大賜雷威加擁護淨天地神咒天地自然穢氣分散洞中玄虛晃朗太元八方威神使我自然靈寶符命普告九天乾羅怛那洞罡太玄斬妖縳邪殺鬼萬千中山神咒元始玉文持誦一遍卻鬼延年按行五嶽八海知聞魔王束首侍衛我軒凶穢消蕩道氣常存急急如律令金光神咒天地玄宗萬氣本根廣修浩劫證吾神通三界內外惟吾獨尊體有金光覆映吾身視之不見聽之不聞包羅天地養育羣生誦持萬遍身有光明三界侍衛五帝司迎萬神朝禮役使雷霆鬼妖喪膽精怪亡形內有霹𩆝雷神隱名洞慧交徹五氣騰騰金光速現覆護壇庭急急如律令香雲浮蓋天尊道由心洽心假香傳香爇玉爐心存九天真仙下盼仙斾臨軒令臣所啓咸賜如言開經偈寂寂至無宗虛峙劫仞阿豁落洞元文誰測此幽遐一入大乘路孰計年劫多不生亦不滅欲生因蓮花超凌三界途慈心解世羅真人無上德世世為仙家爾時太上老君化生諸天諸帝三界羣真十方聖衆一切神仙聖名元始靈寶尊玉帝天皇帝紫微蒼光帝大羅諸天尊金闕諸帝真三十二天帝一切諸天尊三省五師君四聖靈寶師天師張真君萬法真武神救苦諸天尊三官五帝君三百六十天九府神仙衆十方諸天尊名山洞府仙天上諸龍王地下諸龍王雷霆鄧辛張諸司官將吏解厄度人仙風伯雨師神五方蠻雷使三十六雷公百萬諸雷神司命土地神三界功曹使十方諸童子諸天諸地神酆都大帝君地府十王君五嶽諸聖衆泰山諸聖衆閻王諸判官地獄諸聖衆牛頭馬面神夜叉諸鬼王陽間諸聖衆海國諸聖衆城隍里社神太嵗諸神殺東斗衆星君南斗衆星君西斗衆星君北斗衆星君中斗衆星君普天衆星君九天諸聖衆天曹諸神仙十方救苦仙浮邱王郭仙三十六仙官雷聲普化尊修真得道人天上諸羣仙地下諸羣神至聖大成師日月三光神鎮宅諸龍神十方大真人傳法度人師河沙諸佛祖三界羣仙衆十方諸聖衆從吾一氣生天上為吾主地下為吾尊三界十方事玉帝都總權敕命天雷十二地雷十二人雷十二五帝雷公陰陽雷公四令雷公六甲雷公霹𩆝雷公發水雷公八風雷公十雨雷公六道雷公閃電雷公興雲雷公行雨雷公五嶽雷公四瀆雷公八節雷公六候雷公大川雷公溪谷雷公江河雷公四海雷公鳴鼓雷公轟輪雷公火車雷公移山雷公走石雷公火輪雷公興風雷公灑雨雷公行雪雷公布霜雷公行瘟雷公破陳雷公驅邪雷公光明雷公黑暗雷公火印雷公三十六雷無量天兵日夜巡游照察閻浮災殃競起水旱兵戈人民不安爾時雷師告天尊言世間二十四等人心一十九等之人常行惡心敗壤賢良天下不寧敢告天尊哀憫衆生開度一切是時太上老君化身下降生於浮邱王郭三仙掌判雷霆出遊三界放大光明照耀十方掃除不祥玉帝言敕與浮邱王郭三仙斬人鬼驅天雷滅邪巫知大道不顯青篇不為大道故顯青篇是知大道元始天尊說三仙寶號曰玉清高聖虛皇至真混元仙主應化分靈含真體道功行圓成驅雷役電福國康民輔佐忠孝滅罪延齡華蓋祖師人天教主僉書雷霆三省上相金闕大仙孚祐顯靈超應護國浮邱真君九天掌