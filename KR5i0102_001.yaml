日天尊降洪雨萬物與衆生若有諸險難存心念此經天兵來佐助萬惡皆摧傾善者得長生死後上天堂地獄無苦聲羣仙來接引迎歸大羅天齊戒誦此經十方諸天尊放出白毫光金光罩臣身五雷斬妖精捶碎鐵圍山破開諸地獄拔度九幽魂化生十方界夜誦無休息太上開天門玉帝天書詔毫光忽地來三仙現本身接引上天庭朝見諸帝君天尊言若有善男信女生身果薄無力經醮䖍心齊戒酌水獻花皈崇大道浮邱保舉天官賜福地官赦罪水官解厄便生貴子衣食自然天尊言有諸心願齊戒沐浴看誦三日太乙移文上天下地疾速勾銷名書上清王仙保舉玉帝赦罪地獄開解十王真君普放幽魂生者長年死者超升文武星臨五福照曜天尊言勤誦此經閻王不追雷神天將左右跟隨落水不沈入火不燒牢獄解脫枷鎖離身刀劍自斷邪道摧傾世生男子不失人身天尊言看誦百遍諸天記名魔王保舉身有光明看誦萬遍五帝司迎萬神朝禮郭仙保舉玉帝書名三十六仙普告十方東方大仙大聖救苦難南方大仙大聖救苦難西方大仙大聖救苦難北方大仙大聖救苦難東北方大仙大聖救苦難東南方大仙大聖救苦難西北方大仙大聖救苦難西南方大仙大聖救苦難上方大仙大聖救苦難下方大仙大聖救苦難十方大仙大聖救苦難浮邱真君王郭二仙普為衆生無量度人經會踴躍皆大歡喜信受奉行太華蓋山三仙解寃賜福滅罪真經終玉皇御誥太上彌羅無上天妙有玄真境渺渺紫金闕太微玉清宫無極無上聖廓落發光明寂寂浩無宗玄範總十方湛寂真常道恢漠大神通穹蒼真老妙圓清淨智慧辨才至道至尊三界師混元祖無為聖主四生慈父高天上聖大慈仁者十號圓滿萬德周身無量度人拔生死苦諸佛之師衆聖之王太上開天執符御律含真體道金闕雲宫九穹御律萬道無為通明大殿昊天金闕玉皇大天尊玄穹高上帝三稱九拜玉皇大帝御誥終紫元洞天三仙法懺爾時太上老君於開光太初之先集諸天神仙大聖衆十極真人同詣長桑林下暘谷之壇繞旋行道三匝同心作禮各就其座須臾萬變放五色祥光觀見衆生輪回生死田蠶不熟五穀耗散疫𤸚流行人物夭傷兵戈競起時有妙行真人上白天尊曰下方人民不敬天地穢觸三光出入北斗之前種種罪業人心淺薄背道信邪欺師罔聖破人善事說誘句連損子傷胎烹雛破卵滋給口腹不肯布施誹謗聖賢致譴注在黑簿善惡童子四直功曹日夜上奏糾功校罪報應弗差於時元始天尊告太上道君真人所說凶殃之理實可哀憫欲蘇愚迷咸歸福岸諦聽訣言遣賜官衆敬詣三省詔集諸仙須臾咸集天尊告三仙曰邇惟下方人民連年困篤纍歲迍邅故演經科救護羣品敕汝化身天尊遍為巡察凡遇邪氣及有妖星逆次流傳速須翦戮又下人間録善罰惡輔正除邪濟拔人民攝祛妖毒救度一切無有枉傷吾遣威神分布世間按行救度凡人在世豈知輕重或在宫觀靈壇清淨宅舍江河水上䖍備香花時新五果嚴置壇場以三元八節甲子庚申本命生辰請三洞法師明了經文朝禮高真懺悔罪愆免諸苦難人各恭敬志心朝禮貫每句聖號虛皇三寶天尊昊天四帝天尊十方靈寶天尊普天星斗天尊三元三品天尊五師四聖天尊雷霆三省天尊玉清聖境天尊高聖道明天尊虛皇至道天尊至真玉相天尊混元演教天尊仙主化身天尊應化無窮天尊分靈輔正天尊含真孕秀天尊體道安靜天尊功行得道天尊圓成降福天尊驅雷馘祟天尊役電光明天尊福國清平天尊康民祥瑞天尊輔佐上朝天尊忠孝順正天尊滅罪除愆天尊延齡降福天尊華蓋空洞天尊人天演法天尊教主流傳天尊僉書録善天尊雷霆顯應天尊三省上宰天尊上相玉容天尊金闕嵯峨天尊大仙注法天尊孚佑混合天尊顯靈助帝天尊超應羣迷天尊護國安邦天尊浮邱真仙天尊九天遊奕天尊掌録善功天尊上卿賜敕天尊高元大宥天尊上帝垂庥天尊妙道含靈天尊教主談經天尊二五洞真天尊飛步上相天尊正佑顯揚天尊妙靈輔正天尊沖應護佑天尊太虛無窮天尊王仙真帝天尊南極長生天尊注生落死天尊仙卿金容天尊元明太極天尊上帝降祥天尊克誠悟道天尊教主覃恩天尊九十一華天尊上清正一天尊顯佑正揚天尊感靈除邪天尊誠應境土天尊妙遠清虛天尊郭仙真宰天尊北極元上天尊考較三元天尊仙卿金相天尊太明淨妙天尊上帝高真天尊三境化身天尊四靈四妙天尊紀功宥過天尊不言善應天尊賞善罰惡天尊三峯主宰天尊四觀神仙天尊紫清降福天尊三十六昭仙官一十八壇土地福地洞天仙官元應如意仙衆合山朝元真宰家居香火明神虛空過往神祇懺筵無邊列聖隨各信之事而祝意臣等志心皈神皈身皈命朝禮大道真仙福地名山一切真宰聖衆原夫人身難得遇正法以尤希天道貴生全本元而甚少念六根之未悟故五福以長虧凡居覆燾之中盡屬鈞陶之下或貧窮而多子或富貴以少兒方當受用而祿盡天年未曉修真而命終運限或兵戈以暴骨或孕育以傷身或下鬼而欺淩或上天而譴責或土木作犯或水火為傷或先亡伏連或家人移難般般果報種種因緣但知逐利以貪生未識修真而昧性不修片善何以寡尤恐罪積於邱山謹心誠而齊戒一身之內三世以來無義無恩不忠不孝語言誑惑刁詐騙欺謀殺害之多端行淫亂而不顧貪嗔業障惡毒心腸致地府之積愆呈天曹而録簿陰魂受栲死籍追形敢憑上帝之垂庥盡赦下民之多罪誠能動物固無感而不通神亦聽人必有求而皆應恭惟祖師真君人天教主僉書三省闕下降生海北已肇跡於黃山覽秀江南遂飛升於華蓋授二仙以導養同游上清濟羣生於顛危盡造神妙丹砂靈篆留恩澤於人間天燈金船懸圓光於雲際風符雨印燮理陰陽霞旌霓幡游行天地眼前皆赤子普渡慈航頭上即神明同登道岸三峯顯應千里瞻崇香繞長空五色雲中飛縹眇燈明碧落三千界內揚光輝敬潔愚衷恭陳懺悃伏願仙風道氣鎮萬古而長存丹井藥爐救多生於悠久纍朝崇誥敕三教盡皈依掌天上之銓衡為世間之主宰俾令某某父母康寧兄弟和好現存快樂冀福澤於無邊過去超升願逍遙於有永天上人間他生今世學道得道求仙得仙交易合而謀望成事為順而功名遂是非消散災害濳除出宦高遷仁愛聞於四海求嗣多應賢肖誕乎百男財帛豐亨室家咸吉六畜繁而六穀熟萬民泰而萬物安福庇合門仁施一體恩酬已竟靈貺無疆志心稽首禮謝無上至真三寶三境化身天尊不可思議功德仗此懺良因回向衆高真降福與消災增延無量夀經懺後讚三仙妙典字字真銓發明因地徹重玄妙義個中傳滅罪消愆賜福得長年太華蓋山紫元洞天三仙真君法懴終
